table:
  name: notifications
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: userId
  - name: actor
    using:
      foreign_key_constraint_on: actorId
  - name: prompt
    using:
      foreign_key_constraint_on: promptId
  - name: comment
    using:
      foreign_key_constraint_on: commentId
