table:
  name: users
  schema: public
object_relationships:
  - name: accounts
    using:
      foreign_key_constraint_on:
        column: userId
        table:
          name: accounts
          schema: public
  - name: sessions
    using:
      foreign_key_constraint_on:
        column: userId
        table:
          name: sessions
          schema: public
array_relationships:
  - name: prompts
    using:
      foreign_key_constraint_on:
        column: authorId
        table:
          name: prompts
          schema: public
  - name: comments
    using:
      foreign_key_constraint_on:
        column: userId
        table:
          name: comments
          schema: public
  - name: prompt_votes
    using:
      foreign_key_constraint_on:
        column: userId
        table:
          name: prompt_votes
          schema: public
  - name: pinned_prompts
    using:
      foreign_key_constraint_on:
        column: userId
        table:
          name: pinned_prompts
          schema: public
  - name: collections
    using:
      foreign_key_constraint_on:
        column: userId
        table:
          name: collections
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - email
        - username
        - name
        - avatar
        - bio
        - customLinks
        - role
        - locale
        - createdAt
        - updatedAt
        - verified
        - githubUsername
      filter:
        _or:
          - id:
              _eq: X-Hasura-User-Id
          - _and:
              - flagged:
                  _eq: false
